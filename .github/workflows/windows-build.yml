name: Build Windows Release

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      channel:
        description: Update channel to publish
        required: false
        default: stable
      version:
        description: Version label for this build
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Validate sources compile
        shell: pwsh
        run: |
          python -m compileall -q src build_exe.py

      - name: Determine release metadata
        shell: pwsh
        env:
          INPUT_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || '' }}
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $channel = $env:INPUT_CHANNEL
          if ([string]::IsNullOrWhiteSpace($channel)) { $channel = "stable" }
          $version = $env:INPUT_VERSION
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = Get-Date -Format "yyyy.MM.dd.HHmm"
          }
          $tag = "$channel-$version"
          "CHANNEL=$channel" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TAG_NAME=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "REPOSITORY=$env:REPOSITORY" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build Windows EXE and installer
        shell: pwsh
        env:
          PYTHONPATH: ${{ github.workspace }}\src
        run: |
          .\build_release.ps1 -Name ECGMonitor -Version $env:VERSION -Channel $env:CHANNEL -Repository $env:REPOSITORY
          if (!(Test-Path "dist/ECGMonitor/ECGMonitor.exe")) {
            Write-Error "Expected executable missing: dist/ECGMonitor/ECGMonitor.exe"
            exit 1
          }
          if (!(Get-ChildItem "dist/installers" -Filter "*.exe" -ErrorAction SilentlyContinue)) {
            Write-Error "Expected installer missing in dist/installers"
            exit 1
          }

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ECGMonitor-windows-release
          path: |
            dist/ECGMonitor/**
            dist/installers/**
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          target_commitish: ${{ github.sha }}
          name: ECG Monitor ${{ env.VERSION }}
          prerelease: ${{ env.CHANNEL != 'stable' }}
          generate_release_notes: true
          files: |
            dist/installers/*.exe
